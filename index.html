<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRKT Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-logo"><i class="fa-solid fa-cube"></i></div>
            <h1 class="preloader-title">Welcome to MRKT Marketplace</h1>
            <p class="preloader-subtitle">Loading digital gifts...</p>
            <div class="preloader-spinner" style="opacity: 0;">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
    <div id="app" class="app">
        <header class="app-header">
            <nav class="top-nav">
                <div class="nav-scroll">
                    <button class="nav-tab active">Gifts</button>
                    <button class="nav-tab">Stickers</button>
                    <button class="nav-tab">Stars & Premium</button>
                    <button class="nav-tab">Collections</button>
                    <button class="nav-tab">Channels</button>
                    <button class="nav-tab">In-Game</button>
                </div>
            </nav>
            <div class="search-section">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search by NFT name or number">
                    <button class="filter-toggle"><i class="fa-solid fa-sliders"></i></button>
                </div>
                <button class="action-btn cart-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="badge">0</span>
                </button>
                <button class="action-btn">
                    <i class="fa-solid fa-bell"></i>
                </button>
            </div>
        </header>
        <section class="filters-section">
            <div class="filters-scroll">
                <button class="filter-btn active"><span>NFT</span><i class="fa-solid fa-chevron-down"></i></button>
                <button class="filter-btn"><span>Model</span><i class="fa-solid fa-chevron-down"></i></button>
                <button class="filter-btn"><span>Backdrop</span><i class="fa-solid fa-chevron-down"></i></button>
                <button class="filter-btn"><span>Symbol</span><i class="fa-solid fa-chevron-down"></i></button>
                <button class="filter-btn"><span>Price</span><i class="fa-solid fa-chevron-down"></i></button>
                <button class="filter-btn highlight"><span>Pre-Market</span></button>
                <button class="filter-btn"><span>Unupgraded</span></button>
                <button class="filter-btn"><span>Crafted</span></button>
                <button class="filter-btn"><span>Transferable</span></button>
            </div>
        </section>
        <main class="market-section">
            <div class="market-grid" id="marketGrid"></div>
        </main>
        <nav class="bottom-nav">
            <button class="nav-item active">
                <i class="fa-solid fa-store"></i>
                <span>Market</span>
            </button>
            <button class="nav-item">
                <i class="fa-solid fa-receipt"></i>
                <span>Orders</span>
            </button>
            <button class="nav-item">
                <i class="fa-solid fa-gamepad"></i>
                <span>Play Hub</span>
            </button>
            <button class="nav-item">
                <i class="fa-solid fa-list-check"></i>
                <span>Tasks</span>
            </button>
            <button class="nav-item">
                <i class="fa-solid fa-folder-open"></i>
                <span>Storage</span>
            </button>
        </nav>
    </div>
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span>Gift added successfully!</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
